<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Explorando Event Handlers e Manipulação de Elementos DOM em JavaScript</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #lista li { cursor: pointer; margin: 5px 0; padding: 5px 10px; background: #eee; border-radius: 4px; }
    #lista li:hover { background: #f99; }
  </style>
</head>
<body>

  <!-- Ponto 4: h1 começa com "Olá, mundo!" ao carregar a página -->
  <h1 id="titulo">Olá, mundo!</h1>

  <!-- Ponto 1 & 5: Botão que muda o texto do h1 e a cor de fundo -->
  <button id="botao">Clique aqui</button>

  <br><br>

  <!-- Ponto 6: Campo de texto que imprime o valor na consola ao pressionar Enter -->
  <input type="text" id="campo" placeholder="Escreve algo e pressiona Enter">

  <br><br>

  <!-- Ponto 7: Lista cujos elementos são removidos ao clicar -->
  <ul id="lista">
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
    <li>Item 4</li>
  </ul>

  <script src="script.js"></script>
</body>
</html>
